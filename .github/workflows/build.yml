name: Build CS2Vault

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Linux build ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtcharts'
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libxcb-cursor-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: CS2Vault-linux
          path: build/bin/CS2Vault

  # ── Windows build ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtcharts'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build standalone companion exe
        shell: pwsh
        run: |
          cd steamcompanion
          npm install
          npx pkg . --targets node18-win-x64 --output dist/steamcompanion.exe
          cd ..

      - name: Configure
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          $exePath = "build\bin\CS2Vault.exe"
          if (!(Test-Path $exePath)) {
            $exePath = "build\CS2Vault.exe"
          }
          $exeDir = Split-Path $exePath
          windeployqt --release --no-translations --no-system-d3d-compiler $exePath
          echo "Deployed to: $exeDir"

      - name: Stage Windows release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-windows

          $binDir = "build\bin"
          if (!(Test-Path $binDir)) { $binDir = "build" }

          # Copy CS2Vault.exe and all Qt DLLs/plugins
          Get-ChildItem "$binDir" -Recurse | Where-Object { !$_.PSIsContainer } |
            ForEach-Object {
              $rel = $_.FullName.Substring((Resolve-Path $binDir).Path.Length + 1)
              $dest = "release-windows\$rel"
              New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
              Copy-Item $_.FullName $dest
            }

          # Copy standalone companion exe
          Copy-Item steamcompanion\dist\steamcompanion.exe release-windows\steamcompanion.exe

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Create installer
        shell: pwsh
        env:
          NSIS_PATH: C:\Program Files (x86)\NSIS
        run: |
          @"
          !include "MUI2.nsh"

          Name "CS2Vault"
          OutFile "CS2Vault-Setup.exe"
          InstallDir "`$PROGRAMFILES64\CS2Vault"
          InstallDirRegKey HKLM "Software\CS2Vault" "Install_Dir"
          RequestExecutionLevel admin
          BrandingText "CS2Vault"

          !define MUI_ABORTWARNING

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH

          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES

          !insertmacro MUI_LANGUAGE "English"

          Section "CS2Vault" SecMain
            SectionIn RO
            SetOutPath "`$INSTDIR"
            File /r "release-windows\*.*"

            ; Desktop shortcut
            CreateShortcut "`$DESKTOP\CS2Vault.lnk" "`$INSTDIR\CS2Vault.exe"

            ; Start menu shortcut
            CreateDirectory "`$SMPROGRAMS\CS2Vault"
            CreateShortcut "`$SMPROGRAMS\CS2Vault\CS2Vault.lnk" "`$INSTDIR\CS2Vault.exe"
            CreateShortcut "`$SMPROGRAMS\CS2Vault\Uninstall.lnk" "`$INSTDIR\Uninstall.exe"

            ; Write uninstall info to registry
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\CS2Vault" "DisplayName" "CS2Vault"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\CS2Vault" "UninstallString" "`$INSTDIR\Uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\CS2Vault" "DisplayVersion" "1.0.0"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\CS2Vault" "Publisher" "CS2Vault"

            WriteUninstaller "`$INSTDIR\Uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "`$INSTDIR\Uninstall.exe"
            RMDir /r "`$INSTDIR"
            Delete "`$DESKTOP\CS2Vault.lnk"
            RMDir /r "`$SMPROGRAMS\CS2Vault"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\CS2Vault"
            DeleteRegKey HKLM "Software\CS2Vault"
          SectionEnd
          "@ | Out-File -Encoding ASCII installer.nsi

          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: CS2Vault-windows-installer
          path: CS2Vault-Setup.exe

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v4
        with:
          name: CS2Vault-windows-portable
          path: release-windows\

  # ── Release (only on version tags) ───────────────────────────────────────────
  release:
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: CS2Vault-linux
          path: artifacts/linux

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: CS2Vault-windows-installer
          path: artifacts/installer

      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: CS2Vault-windows-portable
          path: artifacts/windows

      - name: Make Linux binary executable
        run: chmod +x artifacts/linux/CS2Vault

      - name: Zip Windows portable build
        run: |
          cd artifacts
          zip -r CS2Vault-windows-portable.zip windows/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/CS2Vault
            artifacts/installer/CS2Vault-Setup.exe
            artifacts/CS2Vault-windows-portable.zip
          generate_release_notes: true
          body: |
            ## CS2Vault ${{ github.ref_name }}

            ### Windows
            **Option 1 — Installer (recommended):** Download `CS2Vault-Setup.exe` and run it. Creates a desktop shortcut and Start Menu entry, includes an uninstaller.

            **Option 2 — Portable:** Download `CS2Vault-windows-portable.zip`, extract anywhere and run `CS2Vault.exe`. No installation needed.

            Both options include everything bundled — no Node.js install required.

            > **Note:** After installing, download `skins.json` into the install folder for full item name resolution in storage units:
            > ```
            > curl -o skins.json "https://raw.githubusercontent.com/ByMykel/CSGO-API/main/public/api/en/skins_not_grouped.json"
            > ```

            ### Linux
            Download `CS2Vault`, make it executable and run it:
            ```
            chmod +x CS2Vault && ./CS2Vault
            ```
            Requires Qt6 and Node.js 18+ installed on your system.

            ### First launch
            Sign in with your Steam account via QR code or browser token. Your login is saved securely — you only need to sign in once.