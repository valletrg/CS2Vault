name: Build CS2Vault

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Linux build ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtcharts'
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libx11-xcb-dev \
            libxcb-cursor-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: CS2Vault-linux
          path: build/bin/CS2Vault

  # ── Windows build ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtcharts'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build standalone companion exe
        shell: pwsh
        run: |
          cd steamcompanion
          npm install
          npx pkg . --targets node18-win-x64 --output dist/steamcompanion.exe
          cd ..

      - name: Configure
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          $exePath = "build\bin\CS2Vault.exe"
          if (!(Test-Path $exePath)) {
            $exePath = "build\CS2Vault.exe"
          }
          $exeDir = Split-Path $exePath
          windeployqt --release --no-translations --no-system-d3d-compiler $exePath
          echo "Deployed to: $exeDir"

      - name: Stage Windows release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-windows

          $binDir = "build\bin"
          if (!(Test-Path $binDir)) { $binDir = "build" }

          # Copy all Qt DLLs and plugins that windeployqt placed next to the exe
          Get-ChildItem "$binDir" -Recurse | Where-Object { !$_.PSIsContainer } |
            ForEach-Object {
              $rel = $_.FullName.Substring((Resolve-Path $binDir).Path.Length + 1)
              $dest = "release-windows\$rel"
              New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
              Copy-Item $_.FullName $dest
            }

          # Copy standalone companion exe — no Node.js install required
          Copy-Item steamcompanion\dist\steamcompanion.exe release-windows\steamcompanion.exe

          # Copy item databases next to the companion exe
          Copy-Item steamcompanion\crates.json      release-windows\ -ErrorAction SilentlyContinue
          Copy-Item steamcompanion\graffiti.json     release-windows\ -ErrorAction SilentlyContinue
          Copy-Item steamcompanion\agents.json       release-windows\ -ErrorAction SilentlyContinue
          Copy-Item steamcompanion\patches.json      release-windows\ -ErrorAction SilentlyContinue
          Copy-Item steamcompanion\collectibles.json release-windows\ -ErrorAction SilentlyContinue
          # skins.json is gitignored (too large) — users download it manually

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: CS2Vault-windows
          path: release-windows\

  # ── Release (only on version tags) ───────────────────────────────────────────
  release:
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: CS2Vault-linux
          path: artifacts/linux

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: CS2Vault-windows
          path: artifacts/windows

      - name: Make Linux binary executable
        run: chmod +x artifacts/linux/CS2Vault

      - name: Zip Windows build
        run: |
          cd artifacts
          zip -r CS2Vault-windows.zip windows/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/CS2Vault
            artifacts/CS2Vault-windows.zip
          generate_release_notes: true
          body: |
            ## CS2Vault ${{ github.ref_name }}

            ### Installation

            **Linux:**
            Download `CS2Vault`, make it executable (`chmod +x CS2Vault`), and run it.
            Requires Qt6 and Node.js 18+ installed on your system.

            **Windows:**
            Download and extract `CS2Vault-windows.zip`. Run `CS2Vault.exe`.
            No additional dependencies required — everything is bundled.
            After first launch, download `skins.json` into the same folder as the exe:
            `curl -o skins.json "https://raw.githubusercontent.com/ByMykel/CSGO-API/main/public/api/en/skins_not_grouped.json"`

            ### First launch
            Sign in with your Steam account via QR code or browser token.
            Your login is saved securely — you only need to sign in once.